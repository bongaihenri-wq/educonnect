name: educonnect
description: Application de suivi scolaire pour parents et enseignants

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  
  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  
  # UI
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.1
  
  # Supabase
  supabase_flutter: ^2.3.4

  shared_preferences: ^2.2.0

  intl: ^0.19.0
  csv: ^6.0.0 
  file_picker: ^8.0.0+1
  excel: ^4.0.2
  http: ^1.2.0 
  mime: ^1.0.5
  uuid: ^4.5.3
  fl_chart: ^0.68.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/templates/students_parents_template.csv
    - assets/templates/teachers_template.csv
    - assets/templates/schedules_template.csv
    